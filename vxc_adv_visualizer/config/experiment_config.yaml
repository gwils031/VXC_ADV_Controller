base_sampling_duration_sec: 10.0
froude_threshold: 1.0
grid:
  x_spacing_feet: 0.1
  y_spacing_feet: 0.05
max_sampling_duration_sec: 20.0

# Environmental calibration
environment:
  # Atmospheric pressure at measurement site in dbar
  # Provo, Utah (elevation ~4551 ft / 1387 m): ~8.5 dbar
  # Sea level: ~10.1325 dbar
  atmospheric_pressure_dbar: 8.5

# Cross-section automation defaults
automation:
  default_dwell_time_sec: 60.0
  movement_settling_time_sec: 2.0
  default_vertical_points: 10
  default_horizontal_points: 15
  default_grid_x_points: 10
  default_grid_y_points: 8

# Session management configuration
sessions:
  base_output_dir: "Data_Output"
  auto_create_on_start: true
  archive_raw_exports: true
  generate_plots: false  # Future feature
  default_operator: ""
